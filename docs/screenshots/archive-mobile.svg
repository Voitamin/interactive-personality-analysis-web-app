<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1280" role="img" aria-labelledby="title desc">
  <title id="title">Archive mobile view</title>
  <desc id="desc">Mobile-oriented UI mockup for the public portfolio version of the app.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4fa0"/>
      <stop offset="100%" stop-color="#ffe25d"/>
    </linearGradient>
  </defs>
  <rect width="720" height="1280" fill="url(#bg)"/>
  <rect x="58" y="42" width="604" height="1196" rx="44" fill="#f8fafc" fill-opacity="0.9"/>
  <text x="104" y="120" fill="#06b6d4" font-size="26" font-weight="700" font-family="Segoe UI, Arial, sans-serif">WMTI ARCHIVE</text>
  <text x="104" y="192" fill="#0f172a" font-size="58" font-weight="800" font-family="Segoe UI, Arial, sans-serif">人格图鉴</text>
  <text x="104" y="238" fill="#334155" font-size="26" font-family="Segoe UI, Arial, sans-serif">Public-safe mobile overview with placeholder result visuals.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="104" y="300" width="220" height="126" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="132" y="360" fill="#0f172a" font-size="52" font-weight="700">16</text>
    <text x="132" y="396" fill="#64748b" font-size="22">outer profiles</text>
    <rect x="354" y="300" width="220" height="126" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="382" y="360" fill="#0f172a" font-size="52" font-weight="700">16</text>
    <text x="382" y="396" fill="#64748b" font-size="22">inner profiles</text>
    <rect x="104" y="456" width="220" height="126" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="132" y="516" fill="#0f172a" font-size="52" font-weight="700">11</text>
    <text x="132" y="552" fill="#64748b" font-size="22">bonus titles</text>
    <rect x="354" y="456" width="220" height="126" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="382" y="516" fill="#0f172a" font-size="52" font-weight="700">57</text>
    <text x="382" y="552" fill="#64748b" font-size="22">archive entries</text>
  </g>
  <text x="104" y="662" fill="#0f172a" font-size="46" font-weight="800" font-family="Segoe UI, Arial, sans-serif">Archive cards</text>
  <g transform="translate(104 710)">
    <rect width="232" height="360" rx="26" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="20" y="20" width="192" height="192" rx="18" fill="#0f172a"/>
    <path d="M36 194L88 136L132 164L172 112L196 194Z" fill="#38bdf8" fill-opacity="0.35"/>
    <path d="M44 190L96 150L136 176L170 132L188 190Z" fill="#f472b6" fill-opacity="0.4"/>
    <text x="20" y="248" fill="#0f172a" font-size="18" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Placeholder result art</text>
    <text x="20" y="282" fill="#475569" font-size="16" font-family="Segoe UI, Arial, sans-serif">Public repo removes original game</text>
    <text x="20" y="304" fill="#475569" font-size="16" font-family="Segoe UI, Arial, sans-serif">illustration assets.</text>
  </g>
  <g transform="translate(376 710)">
    <rect width="232" height="360" rx="26" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="20" y="20" width="192" height="192" rx="18" fill="#0f172a"/>
    <circle cx="116" cy="106" r="52" fill="#fef08a" fill-opacity="0.84"/>
    <path d="M54 188L116 66L178 188" fill="none" stroke="#ffffff" stroke-opacity="0.38" stroke-width="18"/>
    <text x="20" y="248" fill="#0f172a" font-size="18" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Hidden / badge entries</text>
    <text x="20" y="282" fill="#475569" font-size="16" font-family="Segoe UI, Arial, sans-serif">Special unlocks keep their logic and</text>
    <text x="20" y="304" fill="#475569" font-size="16" font-family="Segoe UI, Arial, sans-serif">analytics without bundling source art.</text>
  </g>
</svg>
