<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">Interactive Personality Analysis UI overview</title>
  <desc id="desc">Portfolio overview showing the core UI surfaces using placeholder result cards.</desc>
  <defs>
